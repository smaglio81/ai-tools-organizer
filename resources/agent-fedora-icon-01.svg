<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brim - front arc (below crown) -->
  <path d="M2 17 C2 19.5 6.5 21 12 21 C17.5 21 22 19.5 22 17" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Brim - back left arc (stops at crown) -->
  <path d="M2 17 C2 14.5 3.5 13.5 5.5 13" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Brim - back right arc (stops at crown) -->
  <path d="M22 17 C22 14.5 20.5 13.5 18.5 13" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Crown sides - wider trapezoid, centered on brim -->
  <path d="M5.5 16.5 L7.5 7 L16.5 7 L18.5 16.5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flat top of crown -->
  <line x1="7.5" y1="7" x2="16.5" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Hat band - curved down/toward camera -->
  <path d="M5.5 16 C8 18 16 18 18.5 16" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
