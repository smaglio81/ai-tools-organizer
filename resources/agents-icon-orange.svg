  <!-- Antenna -->
  <line x1="8" y1="4" x2="8" y2="1.5" stroke="#F0A050" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="8" cy="1.5" r="1" fill="#E07020"/>
  <!-- Eyes -->
  <circle cx="6" cy="8" r="1" fill="#E07020"/>
  <circle cx="10" cy="8" r="1" fill="#E07020"/>
  <!-- Mouth -->
