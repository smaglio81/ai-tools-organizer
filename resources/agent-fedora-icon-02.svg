<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Brim - front arc, 3/4 view tilted lower-left -->
  <path d="M1 16 C2 19.5 7 21.5 13 21 C19 20.5 23 18 23 15.5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Brim - back left (stops at crown) -->
  <path d="M1 16 C1 14.5 2 13.5 4 13" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Brim - back right (stops at crown, curves up slightly) -->
  <path d="M23 15.5 C23 14 21.5 12.5 19 12.5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Crown left side -->
  <path d="M4 13 L6.5 6.5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Crown right side -->
  <path d="M19 12.5 L16.5 5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Crown top - pinched, center dips down -->
  <path d="M6.5 6.5 C8 4 10 3 11.5 3.5 C13 4 14.5 3.5 16.5 5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Crown pinch crease - from top center down-left -->
  <path d="M11.5 3.5 L8 10" stroke="currentColor" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Hat band - two lines for thickness -->
  <path d="M4 13 C7 11.5 16 11 19 12.5" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M4.5 14.5 C7.5 13 15.5 12.5 18.5 14" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
